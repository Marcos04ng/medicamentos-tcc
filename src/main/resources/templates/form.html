<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Medicamento - DoseCerta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        /* Mesmas cores da tela principal */
        :root {
            --azul-logo: #145da0;
            --azul-escuro: #0e4273;
            --verde-logo: #65b32e;
            --verde-escuro: #529424;
            --laranja: #ff8c00;
        }
        .sidebar { min-height: 100vh; background-color: var(--azul-logo); }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; font-size: 1rem; }
        .sidebar a:hover, .ativo { background-color: var(--azul-escuro); border-left: 5px solid var(--verde-logo); color: white; }
        .content { background-color: #f4f6f9; padding: 30px; }
        .texto-azul { color: var(--azul-logo) !important; }
        .btn-verde { background-color: var(--verde-logo); color: white; border: none; }
        .btn-verde:hover { background-color: var(--verde-escuro); color: white; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row flex-nowrap">

        <div class="col-auto col-md-3 col-xl-2 px-0 sidebar shadow-lg">
            <div class="d-flex flex-column align-items-center align-items-sm-start pt-4 text-white">
                <div class="w-100 text-center mb-4 px-3">
                    <div class="bg-white p-2 rounded shadow-sm">
                        <img th:src="@{/img/logo.png}" alt="Logo DoseCerta" style="max-height: 45px;">
                    </div>
                </div>
                <ul class="nav flex-column w-100 mb-sm-auto mb-0 align-items-center align-items-sm-start">
                    <li class="w-100">
                        <a href="/" class="nav-link px-3">
                            <i class="bi bi-speedometer2 fs-5 me-2"></i> <span class="d-none d-sm-inline">Dashboard</span>
                        </a>
                    </li>
                    <li class="w-100">
                        <a href="/medicamentos" class="nav-link px-3">
                            <i class="bi bi-box-seam fs-5 me-2"></i> <span class="d-none d-sm-inline">Medicamentos</span>
                        </a>
                    </li>
                    <li class="w-100">
                        <a href="/medicamentos/novo" class="nav-link px-3 ativo">
                            <i class="bi bi-plus-circle fs-5 me-2"></i> <span class="d-none d-sm-inline">Cadastrar Novo</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col content">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h4 class="texto-azul fw-bold mb-0">Cadastrar Novo Medicamento</h4>
            </div>
            <form th:action="@{/medicamentos/salvar}" th:object="${medicamento}" method="POST">

                <input type="hidden" th:field="*{id}">

                <div class="row mb-3">
            <div class="card shadow-sm border-0" style="max-width: 800px;">
                <div class="card-body p-4">

                    <form th:action="@{/medicamentos/salvar}" th:object="${medicamento}" method="POST">

                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label fw-bold texto-azul">Nome do medicamento:</label>
                                <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Paracetamol" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold texto-azul">Dosagem:</label>
                                <input type="text" class="form-control" th:field="*{dosagem}" placeholder="Ex: 500mg" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold texto-azul">Quantidade (Comprimidos/mL):</label>
                                <input type="number" class="form-control" th:field="*{quantidade}" placeholder="Ex: 30" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold texto-azul">Data de validade:</label>
                                <input type="date" class="form-control" th:field="*{dataValidade}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold texto-azul">Observações (opcional):</label>
                            <textarea class="form-control" rows="3" th:field="*{observacoes}" placeholder="Anotações extras..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-verde px-4"><i class="bi bi-check2-circle"></i> Salvar Medicamento</button>
                            <a href="/medicamentos" class="btn btn-light border"><i class="bi bi-arrow-left"></i> Voltar</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
