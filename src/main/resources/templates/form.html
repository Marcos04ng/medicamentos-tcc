<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medicamento.id == null ? 'Cadastrar Medicamento - DoseCerta' : 'Editar Medicamento - DoseCerta'}">Formulário - DoseCerta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --azul-logo: #145da0;
            --azul-escuro: #0e4273;
            --verde-logo: #65b32e;
            --verde-escuro: #529424;
        }
        .sidebar { min-height: 100vh; background-color: var(--azul-logo); }
        .sidebar a, .sidebar button { color: #ecf0f1; text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; font-size: 1rem; text-align: left; }
        .sidebar a:hover, .sidebar button:hover, .ativo { background-color: var(--azul-escuro); border-left: 5px solid var(--verde-logo); color: white; }
        .content { background-color: #f4f6f9; padding: 30px; }
        .btn-verde { background-color: var(--verde-logo); color: white; }
        .btn-verde:hover { background-color: var(--verde-escuro); color: white; }
        .texto-azul { color: var(--azul-logo) !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row flex-nowrap">

        <div class="col-auto col-md-3 col-xl-2 px-0 sidebar shadow-lg">
            <div class="d-flex flex-column align-items-center align-items-sm-start pt-4 text-white">
                <div class="w-100 text-center mb-4 px-3">
                    <div class="bg-white p-2 rounded shadow-sm d-flex align-items-center justify-content-center">
                        <i class="bi bi-shield-plus fs-3 me-2" style="color: var(--verde-logo);"></i>
                        <span class="fs-4 fw-bolder" style="color: var(--azul-logo); letter-spacing: -1px;">
                            Dose<span style="color: var(--verde-logo);">Certa</span>
                        </span>
                    </div>
                </div>
                <ul class="nav flex-column w-100 mb-sm-auto mb-0 align-items-center align-items-sm-start" id="menu">

                    <li class="w-100">
                        <a href="/home" class="nav-link px-3">
                            <i class="bi bi-house-door fs-5 me-2"></i> <span class="d-none d-sm-inline">Início</span>
                        </a>
                    </li>

                    <li class="w-100">
                        <a href="/medicamentos" class="nav-link px-3">
                            <i class="bi bi-box-seam fs-5 me-2"></i> <span class="d-none d-sm-inline">Medicamentos</span>
                        </a>
                    </li>

                    <li class="w-100">
                        <a href="/medicamentos/novo" class="nav-link px-3 ativo">
                            <i class="bi bi-plus-circle fs-5 me-2"></i> <span class="d-none d-sm-inline">Cadastrar Novo</span>
                        </a>
                    </li>

                    <li class="w-100 mt-4">
                        <form th:action="@{/logout}" method="post" class="m-0 p-0 w-100">
                            <button type="submit" class="nav-link px-3 text-warning fw-bold bg-transparent border-0 w-100">
                                <i class="bi bi-box-arrow-right fs-5 me-2"></i> <span class="d-none d-sm-inline">Sair do Sistema</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col content">

            <div style="max-width: 800px; margin: 0 auto;">

                <h4 class="texto-azul fw-bold mb-4" th:text="${medicamento.id == null ? 'Cadastrar Novo Medicamento' : 'Editar Medicamento'}">Formulário</h4>

                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4">

                        <form th:action="@{/medicamentos/salvar}" th:object="${medicamento}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="row g-3">
                                <div class="col-md-7">
                                    <label class="form-label fw-bold texto-azul">Nome do medicamento:</label>
                                    <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Paracetamol" required>
                                </div>

                                <div class="col-md-5">
                                    <label class="form-label fw-bold texto-azul">Dosagem:</label>
                                    <input type="text" th:field="*{dosagem}" class="form-control" placeholder="Ex: 500mg" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold texto-azul">Quantidade (Comprimidos/mL):</label>
                                    <input type="number" th:field="*{quantidade}" class="form-control" placeholder="Ex: 30" min="0" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold texto-azul">Data de validade:</label>
                                    <input type="date" th:field="*{dataValidade}" class="form-control" required>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold texto-azul">Observações (opcional):</label>
                                    <textarea th:field="*{observacoes}" class="form-control" rows="3" placeholder="Anotações extras..."></textarea>
                                </div>

                                <div class="col-12 mt-4 pt-2 d-flex gap-2">
                                    <button type="submit" class="btn btn-verde px-4">
                                        <i class="bi bi-check-circle"></i> Salvar Medicamento
                                    </button>
                                    <a href="/medicamentos" class="btn btn-outline-secondary px-4">
                                        <i class="bi bi-arrow-left"></i> Voltar
                                    </a>
                                </div>
                            </div>
                        </form>

                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
