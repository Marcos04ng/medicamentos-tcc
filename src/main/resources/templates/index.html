<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicamentos - DoseCerta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --azul-logo: #145da0;
            --azul-escuro: #0e4273;
            --verde-logo: #65b32e;
            --verde-escuro: #529424;
            --laranja: #ff8c00;
        }
        .sidebar { min-height: 100vh; background-color: var(--azul-logo); }
        .sidebar a, .sidebar button { color: #ecf0f1; text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; font-size: 1rem; text-align: left; }
        .sidebar a:hover, .sidebar button:hover, .ativo { background-color: var(--azul-escuro); border-left: 5px solid var(--verde-logo); color: white; }
        .content { background-color: #f4f6f9; padding: 30px; }
        .btn-verde { background-color: var(--verde-logo); color: white; }
        .btn-verde:hover { background-color: var(--verde-escuro); color: white; }
        .btn-outline-laranja { color: var(--laranja); border-color: var(--laranja); }
        .btn-outline-laranja:hover { background-color: var(--laranja); color: white; }
        .texto-azul { color: var(--azul-logo) !important; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row flex-nowrap">

        <div class="col-auto col-md-3 col-xl-2 px-0 sidebar shadow-lg">
            <div class="d-flex flex-column align-items-center align-items-sm-start pt-4 text-white">
                <div class="w-100 text-center mb-4 px-3">
                    <div class="bg-white p-2 rounded shadow-sm d-flex align-items-center justify-content-center">
                        <i class="bi bi-shield-plus fs-3 me-2" style="color: var(--verde-logo);"></i>
                        <span class="fs-4 fw-bolder" style="color: var(--azul-logo); letter-spacing: -1px;">
                            Dose<span style="color: var(--verde-logo);">Certa</span>
                        </span>
                    </div>
                </div>
                <ul class="nav flex-column w-100 mb-sm-auto mb-0 align-items-center align-items-sm-start" id="menu">

                    <li class="w-100">
                        <a href="/home" class="nav-link px-3">
                            <i class="bi bi-house-door fs-5 me-2"></i> <span class="d-none d-sm-inline">Início</span>
                        </a>
                    </li>

                    <li class="w-100">
                        <a href="/medicamentos" class="nav-link px-3 ativo">
                            <i class="bi bi-box-seam fs-5 me-2"></i> <span class="d-none d-sm-inline">Medicamentos</span>
                        </a>
                    </li>

                    <li class="w-100">
                        <a href="/medicamentos/novo" class="nav-link px-3">
                            <i class="bi bi-plus-circle fs-5 me-2"></i> <span class="d-none d-sm-inline">Cadastrar Novo</span>
                        </a>
                    </li>

                    <li class="w-100 mt-4">
                        <form th:action="@{/logout}" method="post" class="m-0 p-0 w-100">
                            <button type="submit" class="nav-link px-3 text-warning fw-bold bg-transparent border-0 w-100 text-start">
                                <i class="bi bi-box-arrow-right fs-5 me-2"></i> <span class="d-none d-sm-inline">Sair do Sistema</span>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col content">

            <div style="max-width: 1200px; margin: 0 auto;">

                <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${mensagemSucesso}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${mensagemErro}" class="alert alert-warning alert-dismissible fade show shadow-sm" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span th:text="${mensagemErro}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${mensagemAlertaDuplicado}" class="alert alert-dismissible fade show shadow-sm fw-bold" role="alert" style="background-color: #fff3cd; color: #856404; border-color: #ffeeba;">
                    <i class="bi bi-exclamation-triangle-fill me-2" style="color: var(--laranja);"></i>
                    <span th:text="${mensagemAlertaDuplicado}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                    <h4 class="texto-azul fw-bold mb-0">Gerenciamento de Medicamentos</h4>
                    <a th:href="@{/medicamentos/novo}" class="btn btn-verde shadow-sm">
                        <i class="bi bi-plus"></i> Adicionar Medicamento
                    </a>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th class="px-4 py-2 texto-azul">Nome</th>
                                    <th class="px-4 py-2 texto-azul">Laboratório</th>
                                    <th class="px-4 py-2 texto-azul">Dosagem</th>
                                    <th class="px-4 py-2 texto-azul">Qtd.</th>
                                    <th class="px-4 py-2 texto-azul">Validade</th>
                                    <th class="px-4 py-2 texto-azul">Observações</th>
                                    <th class="text-center px-4 py-2 texto-azul">Ações</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="remedio : ${listaMedicamentos}">

                                    <td class="px-4 py-3 fw-bold" style="color: #4a4a4a;" th:text="${remedio.nome}"></td>

                                    <td class="px-4 py-3" style="color: #4a4a4a;" th:text="${remedio.laboratorio != null ? remedio.laboratorio.nome : '-'}"></td>

                                    <td class="px-4 py-3" style="color: #6c757d;" th:text="${remedio.dosagem}"></td>

                                    <td class="px-4 py-3">
                                        <span class="badge"
                                              th:style="${remedio.quantidade < 10 ? 'background-color: var(--laranja);' : 'background-color: var(--verde-logo);'}"
                                              th:text="${remedio.quantidade}">
                                        </span>
                                        <i th:if="${remedio.quantidade < 10}" class="bi bi-exclamation-triangle-fill text-warning ms-1" title="Estoque Baixo"></i>
                                    </td>

                                    <td class="px-4 py-3">
                                        <span th:text="${#temporals.format(remedio.dataValidade, 'dd/MM/yyyy')}"
                                              th:classappend="${remedio.dataValidade.isBefore(#temporals.createToday()) ? 'text-danger fw-bold' : ''}">
                                        </span>
                                        <span th:if="${remedio.dataValidade.isBefore(#temporals.createToday())}"
                                              class="badge bg-danger ms-2" style="font-size: 0.75rem;">
                                            <i class="bi bi-x-circle me-1"></i>Vencido
                                        </span>
                                    </td>

                                    <td class="px-4 py-3" style="color: #6c757d;" th:text="${remedio.observacoes != null ? #strings.abbreviate(remedio.observacoes, 30) : '-'}"></td>

                                    <td class="text-center px-4 py-3 text-nowrap">
                                        <a th:href="@{/medicamentos/tomar/{id}(id=${remedio.id})}" class="btn btn-sm btn-verde me-1" title="Tomar 1 Dose">
                                            <i class="bi bi-check2-circle"></i> Uso
                                        </a>
                                        <a th:href="@{/medicamentos/editar/{id}(id=${remedio.id})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i> Editar</a>
                                        <a th:href="@{/medicamentos/excluir/{id}(id=${remedio.id})}" class="btn btn-sm btn-outline-laranja" onclick="return confirm('Tem certeza que deseja apagar este medicamento?');"><i class="bi bi-trash"></i> Remover</a>
                                    </td>

                                </tr>
                                </tbody>

                            </table>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
