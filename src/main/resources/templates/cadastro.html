<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta - DoseCerta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #145da0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card-cadastro { max-width: 400px; width: 100%; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
    .btn-verde { background-color: #65b32e; color: white; border: none;}
  </style>
</head>
<body>
<div class="card card-cadastro bg-white p-4 mx-3">
  <div class="text-center mb-4">
    <h4 style="color: #145da0;" class="fw-bold">Criar Nova Conta</h4>
    <p class="text-muted small">Preencha os dados para acessar o DoseCerta</p>
  </div>

  <form th:action="@{/cadastro/salvar}" method="POST">
    <div class="mb-3">
      <label class="form-label fw-bold" style="color: #145da0;">Escolha um Usuário</label>
      <input type="text" name="login" class="form-control bg-light" placeholder="Ex: marcos_dev" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold" style="color: #145da0;">Crie uma Senha</label>
      <input type="password" name="senha" class="form-control bg-light" placeholder="Mínimo 6 caracteres" required>
    </div>

    <button type="submit" class="btn btn-verde w-100 fw-bold py-2 mb-3">Finalizar Cadastro</button>
    <div class="text-center">
      <a href="/login" class="text-decoration-none small" style="color: #145da0;">Já tenho uma conta. Voltar ao login.</a>
    </div>
  </form>
</div>
</body>
</html>
