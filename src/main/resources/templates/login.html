<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - DoseCerta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --azul-logo: #145da0;
            --azul-escuro: #0e4273;
            --verde-logo: #65b32e;
        }
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
        }
        .card-login {
            border: none;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
        }
        .btn-azul {
            background-color: var(--azul-logo);
            color: white;
            font-weight: bold;
        }
        .btn-azul:hover {
            background-color: var(--azul-escuro);
            color: white;
        }
        .texto-azul {
            color: var(--azul-logo);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">

<div class="card card-login shadow-lg p-4">
    <div class="card-body">

        <div class="text-center mb-4">
            <div class="d-flex align-items-center justify-content-center mb-2">
                <i class="bi bi-shield-plus fs-1 style" style="color: var(--verde-logo); font-size: 2.5rem; margin-right: 10px;"></i>
                <span class="fs-2 fw-bolder" style="color: var(--azul-logo); letter-spacing: -1px; font-size: 2.2rem;">
                    Dose<span style="color: var(--verde-logo);">Certa</span>
                </span>
            </div>
            <p class="text-muted small">Gerenciamento Inteligente de Medicamentos</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger text-center py-2 shadow-sm" role="alert">
            <i class="bi bi-exclamation-circle me-1"></i> Usuário ou senha inválidos.
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-center py-2 shadow-sm" role="alert">
            <i class="bi bi-check-circle me-1"></i> Você saiu do sistema com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold texto-azul">Usuário (E-mail):</label>
                <div class="input-group">
                    <span class="input-group-text bg-white text-muted"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="seu@email.com" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold texto-azul">Senha:</label>
                <div class="input-group">
                    <span class="input-group-text bg-white text-muted"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-azul w-100 py-2 shadow-sm mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i> Entrar no Sistema
            </button>

            <div class="text-center mt-3">
                <span class="text-muted small">Não tem conta? </span>
                <a href="/cadastro" class="small fw-bold" style="color: var(--verde-logo); text-decoration: none;">Cadastre-se aqui</a>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
